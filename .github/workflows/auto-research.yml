name: Auto Research – CREATIVE EDGE

on:
  schedule:
    # 3日ごと 日本時間9:00（UTC 0:00）
    - cron: "0 0 */3 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（cases.jsonを更新しない）"
        type: boolean
        default: false

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run auto-research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/auto-research.mjs --dry-run
          else
            node scripts/auto-research.mjs
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/cases.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            COUNT=$(git diff data/cases.json | grep '^+' | grep '"id"' | wc -l | tr -d ' ')
            echo "count=${COUNT}" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "CREATIVE EDGE Bot"
          git config user.email "bot@creative-edge.auto"
          git add data/cases.json
          git commit -m "Auto research: add ${{ steps.check_changes.outputs.count }} new cases [$(date +'%Y-%m-%d')]"
          git push

      - name: Summary
        if: always()
        run: |
          echo "### CREATIVE EDGE Auto Research" >> $GITHUB_STEP_SUMMARY
          echo "- 実行日時: $(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "- **追加: ${{ steps.check_changes.outputs.count }}件**" >> $GITHUB_STEP_SUMMARY
          else
            echo "- 新規追加なし" >> $GITHUB_STEP_SUMMARY
          fi
