<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景: 丸角の黒い正方形 -->
  <rect width="100" height="100" rx="18" fill="#111111"/>
  <!-- 虫眼鏡レンズ -->
  <circle cx="42" cy="41" r="24" fill="none" stroke="#eeece7" stroke-width="8"/>
  <!-- 虫眼鏡ハンドル -->
  <line x1="60" y1="59" x2="82" y2="81" stroke="#eeece7" stroke-width="8" stroke-linecap="round"/>
  <!-- R（ResearchManの頭文字 / レンズの中） -->
  <text
    x="42" y="53"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-weight="900"
    font-size="26"
    text-anchor="middle"
    fill="#eeece7"
  >R</text>
</svg>
